<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">

  <title>{% block title %}IAM Sentinel{% endblock %}</title>
  <meta content="" name="description">
  <meta content="" name="keywords">

  <link href="{{ url_for('static', filename='assets/img/favicon.png') }}" rel="icon">
  <link href="{{ url_for('static', filename='assets/img/apple-touch-icon.png') }}" rel="apple-touch-icon">

  <link href="https://fonts.gstatic.com" rel="preconnect">
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,300i,400,400i,600,600i,700,700i|Nunito:300,300i,400,400i,600,600i,700,700i|Poppins:300,300i,400,400i,500,500i,600,600i,700,700i" rel="stylesheet">

  <link href="{{ url_for('static', filename='assets/vendor/bootstrap/css/bootstrap.min.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='assets/vendor/bootstrap-icons/bootstrap-icons.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='assets/vendor/boxicons/css/boxicons.min.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='assets/vendor/quill/quill.snow.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='assets/vendor/quill/quill.bubble.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='assets/vendor/remixicon/remixicon.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='assets/vendor/simple-datatables/style.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='assets/css/style.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='assets/css/iam-sentinel-polish.css') }}" rel="stylesheet">
</head>

<body>

  <header id="header" class="header fixed-top d-flex align-items-center">
    <div class="d-flex align-items-center justify-content-between">
      <a href="/dashboard" class="logo d-flex align-items-center">
        <img src="{{ url_for('static', filename='assets/img/logo.png') }}" alt="">
        <span class="d-none d-lg-block">NiceAdmin</span>
      </a>
      <i class="bi bi-list toggle-sidebar-btn"></i>
    </div>
  </header>

  <aside id="sidebar" class="sidebar">
    <ul class="sidebar-nav" id="sidebar-nav">
      <li class="nav-item">
        <a class="nav-link{% if active_page != 'dashboard' %} collapsed{% endif %}" href="/dashboard">
          <i class="bi bi-grid"></i>
          <span>Dashboard</span>
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link{% if active_page != 'findings' %} collapsed{% endif %}" href="/findings">
          <i class="bi bi-list-check"></i>
          <span>Findings</span>
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link{% if active_page != 'identities' %} collapsed{% endif %}" href="/identities">
          <i class="bi bi-people"></i>
          <span>Identities</span>
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link{% if active_page != 'resources' %} collapsed{% endif %}" href="/resources">
          <i class="bi bi-hdd-network"></i>
          <span>Resources</span>
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link{% if active_page != 'access_paths' %} collapsed{% endif %}" href="/access-paths">
          <i class="bi bi-signpost-split"></i>
          <span>Access Paths</span>
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link{% if active_page != 'access_reviews' %} collapsed{% endif %}" href="/access-reviews">
          <i class="bi bi-clipboard-check"></i>
          <span>Access Reviews</span>
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link{% if active_page != 'reports' %} collapsed{% endif %}" href="/reports">
          <i class="bi bi-file-earmark-bar-graph"></i>
          <span>Reports</span>
        </a>
      </li>
    </ul>
  </aside>

  <main id="main" class="main"{% block main_attrs %}{% endblock %}>
    {% block content %}{% endblock %}
  </main>

  {% block after_main %}{% endblock %}

  <footer id="footer" class="footer">
    <div class="copyright">
      &copy; Copyright <strong><span>NiceAdmin</span></strong>. All Rights Reserved
    </div>
    <div class="credits">
      Designed by <a href="https://bootstrapmade.com/">BootstrapMade</a>
    </div>
  </footer>

  <a href="#" class="back-to-top d-flex align-items-center justify-content-center"><i class="bi bi-arrow-up-short"></i></a>

  <script src="{{ url_for('static', filename='assets/vendor/apexcharts/apexcharts.min.js') }}"></script>
  <script src="{{ url_for('static', filename='assets/vendor/bootstrap/js/bootstrap.bundle.min.js') }}"></script>
  <script src="{{ url_for('static', filename='assets/vendor/chart.js/chart.umd.js') }}"></script>
  <script src="{{ url_for('static', filename='assets/vendor/echarts/echarts.min.js') }}"></script>
  <script src="{{ url_for('static', filename='assets/vendor/quill/quill.js') }}"></script>
  <script src="{{ url_for('static', filename='assets/vendor/simple-datatables/simple-datatables.js') }}"></script>
  <script src="{{ url_for('static', filename='assets/vendor/tinymce/tinymce.min.js') }}"></script>
  <script src="{{ url_for('static', filename='assets/vendor/php-email-form/validate.js') }}"></script>

  <script src="{{ url_for('static', filename='assets/js/iam-sentinel-ui.js') }}"></script>
  {% block scripts %}{% endblock %}
  <script src="{{ url_for('static', filename='assets/js/main.js') }}"></script>

</body>

</html>
